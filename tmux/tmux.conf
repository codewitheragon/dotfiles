# Remap prefix from `Ctrl+B` to `Ctrl+A`
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# Split panes easily using intuitive visual shortcuts
# Ctrl+A followed by | splits vertically. Ctrl+A followed by - splits horizontally.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Enable mouse mode for quick scroll
set -g mouse on

# Stop window auto-renaming so your names stick
set-option -g allow-rename off

# Ensure 256-color support inside terminal sessions
set -g default-terminal "screen-256color"

# --- Appearance ---
# Status bar colors
set -g status-style bg=default,fg=white
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=white]| "
set -g status-right "#[fg=yellow]%Y-%m-%d #[fg=white]| #[fg=cyan]%H:%M "
set -g window-status-current-style fg=black,bg=yellow,bold
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour240

# --- Keybindings ---
# Reload config
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"

# Use Vim shortcuts to move around panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Vim shortcuts to resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Bind Ctrl+A followed by Ctrl+F to open a floating file finder
bind-key C-f run-shell "tmux popup -E -w 80% -h 80% 'fzf'"

# Enable Yazi Image preview in Tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
